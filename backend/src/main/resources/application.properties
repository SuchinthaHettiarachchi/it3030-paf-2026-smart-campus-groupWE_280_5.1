spring.application.name=backend
# MongoDB - Use environment variable for cloud deployment, fallback to localhost
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/SmartCampus}

# Server Configuration - Allow network access
server.address=0.0.0.0
server.port=${PORT:8080}

# Google OAuth2 Config (To be filled in by developer)
