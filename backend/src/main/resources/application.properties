# ── Server ─────────────────────────────────────────────────────
server.port=8080

# ── Supabase / PostgreSQL ───────────────────────────────────────
# Copy backend/.env.example to backend/.env and fill real values.
# Spring Boot reads these via environment variables or .env loader.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.xxxx.supabase.co:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your-db-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' once tables exist in Supabase; change to 'none' if you handle schema via SQL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── File Upload ─────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ── Supabase Storage ────────────────────────────────────────────
supabase.url=${SUPABASE_URL:https://xxxx.supabase.co}
supabase.key=${SUPABASE_KEY:your-service-role-key}
supabase.storage.bucket=ticket-attachments

# ── JWT (stubs – Chanuka will complete) ─────────────────────────
jwt.secret=${JWT_SECRET:placeholder-secret-min-32-chars-long-abc}
jwt.expiration=86400000
