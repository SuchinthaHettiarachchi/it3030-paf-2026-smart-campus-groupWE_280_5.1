spring.application.name=backend
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=SmartCampus
app.base-url=${BASE_URL:http://localhost:8080}

# Server Configuration - Allow network access
server.address=0.0.0.0
server.port=8080

# Google OAuth2 Config (To be filled in by developer)
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# JWT Config (To be used later)
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expirationMs=86400000

# OAuth2 post-login redirect (frontend)
oauth.success-url=${OAUTH_SUCCESS_URL:http://localhost:5173/select-role}
